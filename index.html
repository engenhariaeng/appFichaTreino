<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Treino Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-card: #1e293b;
            --cor-primaria: #10b981;
            --cor-primaria-hover: #059669;
            --cor-perigo: #ef4444;
            --cor-perigo-hover: #dc2626;
            --texto-claro: #f8fafc;
            --texto-mutado: #94a3b8;
            --borda: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--borda);
            padding-bottom: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--texto-claro);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-treino {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--borda);
            color: var(--texto-claro);
            font-size: 1.5rem;
            font-weight: 700;
            width: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-treino:focus {
            border-color: var(--cor-primaria);
        }

        /* Formulário de Adicionar Exercício */
        .form-exercicio {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 12px;
            margin-bottom: 24px;
            align-items: end;
        }

        .grupo-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .grupo-input label {
            font-size: 0.85rem;
            color: var(--texto-mutado);
            font-weight: 500;
        }

        input, select {
            background: var(--bg-principal);
            border: 1px solid var(--borda);
            color: var(--texto-claro);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
        }

        input:focus {
            border-color: var(--cor-primaria);
        }

        button {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-adicionar {
            background: var(--cor-primaria);
            color: #000;
            height: 42px;
        }

        .btn-adicionar:hover {
            background: var(--cor-primaria-hover);
        }

        .btn-pdf {
            background: #e2e8f0;
            color: #0f172a;
        }

        .btn-pdf:hover {
            background: #cbd5e1;
        }

        /* Tabela de Exercícios */
        .container-tabela {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 14px;
            border-bottom: 1px solid var(--borda);
        }

        th {
            color: var(--texto-mutado);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 0.95rem;
        }

        .check-concluido {
            width: 20px;
            height: 20px;
            accent-color: var(--cor-primaria);
            cursor: pointer;
        }

        .linha-concluida {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .btn-deletar {
            background: transparent;
            color: var(--cor-perigo);
            padding: 6px;
            border-radius: 4px;
        }

        .btn-deletar:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .lista-vazia {
            text-align: center;
            padding: 40px 0;
            color: var(--texto-mutado);
        }

        /* Responsividade (Smartphones e Tablets) */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 16px;
            }

            .form-exercicio {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .btn-adicionar {
                width: 100%;
                margin-top: 8px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .btn-pdf {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>💪 <input type="text" id="nomeTreino" class="input-treino" value="Treino A"></h1>
            <button class="btn-pdf" onclick="exportarPDF()">
                📥 Exportar PDF
            </button>
        </header>

        <div class="form-exercicio">
            <div class="grupo-input">
                <label for="exercicio">Nome do Exercício</label>
                <input type="text" id="exercicio" placeholder="Ex: Supino Reto" autocomplete="off">
            </div>
            <div class="grupo-input">
                <label for="series">Séries</label>
                <input type="number" id="series" placeholder="4" min="1">
            </div>
            <div class="grupo-input">
                <label for="repeticoes">Repetições</label>
                <input type="text" id="repeticoes" placeholder="12 ou 10-12">
            </div>
            <button class="btn-adicionar" onclick="adicionarExercicio()">+ Adicionar</button>
        </div>

        <div class="container-tabela">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">Check</th>
                        <th>Exercício</th>
                        <th style="width: 100px;">Séries</th>
                        <th style="width: 120px;">Repetições</th>
                        <th style="width: 60px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="listaExercicios">
                    </tbody>
            </table>
            <div id="mensagemVazia" class="lista-vazia">
                Nenhum exercício adicionado ainda. Comece a montar seu treino!
            </div>
        </div>
    </div>

    <script>
        // Array para armazenar os exercícios em memória
        let listaTreino = [];

        const inputExercicio = document.getElementById('exercicio');
        const inputSeries = document.getElementById('series');
        const inputRepeticoes = document.getElementById('repeticoes');
        const tabelaBf = document.getElementById('listaExercicios');
        const mensagemVazia = document.getElementById('mensagemVazia');
        const nomeTreinoInput = document.getElementById('nomeTreino');

        // Função para atualizar a interface da tabela
        function renderizarTabela() {
            tabelaBf.innerHTML = '';
            
            if (listaTreino.length === 0) {
                mensagemVazia.style.display = 'block';
                return;
            } else {
                mensagemVazia.style.display = 'none';
            }

            listaTreino.forEach((item, index) => {
                const tr = document.createElement('tr');
                if (item.concluido) tr.classList.add('linha-concluida');

                tr.innerHTML = `
                    <td>
                        <input type="checkbox" class="check-concluido" ${item.concluido ? 'checked' : ''} onchange="alternarConcluido(${index})">
                    </td>
                    <td><strong>${item.nome}</strong></td>
                    <td>${item.series}</td>
                    <td>${item.repeticoes}</td>
                    <td>
                        <button class="btn-deletar" onclick="removerExercicio(${index})" title="Remover">🗑️</button>
                    </td>
                `;
                tabelaBf.appendChild(tr);
            });
        }

        // Adiciona um novo exercício à lista
        function adicionarExercicio() {
            const nome = inputExercicio.value.trim();
            const series = inputSeries.value.trim();
            const repeticoes = inputRepeticoes.value.trim();

            if (!nome || !series || !repeticoes) {
                alert('Por favor, preencha todos os campos do exercício.');
                return;
            }

            listaTreino.push({
                nome: nome,
                series: series,
                repeticoes: repeticoes,
                concluido: false
            });

            // Limpa os campos após inserção
            inputExercicio.value = '';
            inputSeries.value = '';
            inputRepeticoes.value = '';
            inputExercicio.focus();

            renderizarTabela();
        }

        // Marca ou desmarca o exercício como feito (Acompanhamento Diário)
        function alternarConcluido(index) {
            listaTreino[index].concluido = !listaTreino[index].concluido;
            renderizarTabela();
        }

        // Remove o exercício
        function removerExercicio(index) {
            listaTreino.splice(index, 1);
            renderizarTabela();
        }

        // Exportação do Treino Formatado em PDF
        function exportarPDF() {
            if (listaTreino.length === 0) {
                alert('Adicione pelo menos um exercício antes de exportar!');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const tituloTreino = nomeTreinoInput.value.toUpperCase();

            // Configuração estética do PDF
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.textColor(15, 23, 42); // Cor escura estruturada
            doc.text(`FICHA DE TREINO: ${tituloTreino}`, 14, 25);

            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.textColor(100, 116, 139);
            const dataAtual = new Date().toLocaleDateString('pt-BR');
            doc.text(`Gerado em: ${dataAtual} | Acompanhamento de Performance`, 14, 32);

            // Linha divisória
            doc.setDrawColor(203, 213, 225);
            doc.line(14, 36, 196, 36);

            // Cabeçalho da Tabela no PDF
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.textColor(51, 65, 85);
            doc.text("Status", 14, 46);
            doc.text("Exercício", 40, 46);
            doc.text("Séries", 135, 46);
            doc.text("Repetições", 165, 46);

            doc.line(14, 50, 196, 50);

            // Listagem dos itens
            doc.setFont("helvetica", "normal");
            let linhaY = 58;

            listaTreino.forEach((item) => {
                // Quebra de página automática se o treino for muito longo
                if (linhaY > 275) {
                    doc.addPage();
                    linhaY = 25;
                }

                // Status em formato de texto para conferência posterior
                const statusText = item.concluido ? "[ X ]" : "[   ]";
                doc.setFont("monospace", "normal");
                doc.text(statusText, 15, linhaY);
                
                doc.setFont("helvetica", "normal");
                doc.text(item.nome, 40, linhaY);
                doc.text(String(item.series), 140, linhaY);
                doc.text(String(item.repeticoes), 170, linhaY);

                // Linha fina separadora de exercícios
                doc.setDrawColor(241, 245, 249);
                doc.line(14, linhaY + 4, 196, linhaY + 4);

                linhaY += 10;
            });

            // Salva o arquivo final
            doc.save(`ficha_de_treino_${tituloTreino.toLowerCase().replace(/\s+/g, '_')}.pdf`);
        }

        // Permite adicionar o exercício ao apertar 'Enter' nos campos
        [inputExercicio, inputSeries, inputRepeticoes].forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    adicionarExercicio();
                }
            });
        });
    </script>
</body>
</html>
