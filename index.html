<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0f172a"/>
<title>FichaFit – Criador de Treinos</title>
<style>
:root {
  --bg-principal: #0f172a;       /* Azul escuro profundo */
  --bg-card: #1e293b;            /* Painéis e cards intermediários */
  --bg-input: #0f172a;           /* Fundo dos campos de entrada */
  --cor-primaria: #10b981;       /* Verde Esmeralda Vibrante */
  --cor-primaria-hover: #059669; /* Verde Esmeralda Escuro */
  --cor-perigo: #ef4444;         /* Vermelho para exclusão */
  --texto-claro: #f8fafc;        /* Texto principal */
  --texto-mutado: #94a3b8;       /* Legendas e textos secundários */
  --borda: #334155;              /* Divisórias discretas */
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:var(--bg-principal);color:var(--texto-claro);min-height:100vh;}

/* HEADER */
.header{background:var(--bg-card);border-bottom:1px solid var(--borda);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg, var(--cor-primaria), #34d399);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-size:18px;font-weight:700;letter-spacing:-0.3px;color:var(--texto-claro);}
.logo-text span{color:var(--cor-primaria);}
.header-actions{display:flex;gap:8px;}

/* LAYOUT */
.container{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 57px);}
.sidebar{background:var(--bg-card);border-right:1px solid var(--borda);padding:18px 14px;overflow-y:auto;max-height:calc(100vh - 57px);position:sticky;top:57px;}
.main{padding:22px 24px;overflow-y:auto;}

/* SIDEBAR & GERENCIADOR */
.sidebar-header-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
  padding: 0 4px;
}
.sidebar-title{font-size:11px;font-weight:600;color:var(--texto-mutado);text-transform:uppercase;letter-spacing:.08em;}
.btn-novo-ex {
  background: rgba(16, 185, 129, 0.1);
  color: var(--cor-primaria);
  border: 1px dashed var(--cor-primaria);
  padding: 8px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  text-align: center;
  transition: all 0.15s;
}
.btn-novo-ex:hover {
  background: var(--cor-primaria);
  color: #000;
  border-style: solid;
}
.form-novo-ex {
  background: var(--bg-principal);
  border: 1px solid var(--borda);
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.form-novo-ex input, .form-novo-ex select {
  padding: 6px 8px;
  font-size: 12px;
}

.muscle-group{margin-bottom:4px;}
.muscle-btn{width:100%;background:transparent;border:none;border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;text-align:left;transition:background .15s;color:var(--texto-claro);}
.muscle-btn:hover{background:var(--bg-principal);}
.muscle-btn.active{background:rgba(16, 185, 129, 0.05);color:var(--cor-primaria);border: 1px solid rgba(16, 185, 129, 0.15);}
.muscle-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.muscle-name{font-size:13px;font-weight:500;}
.muscle-count{margin-left:auto;font-size:11px;color:var(--texto-claro);background:var(--cor-primaria);padding:2px 7px;border-radius:20px;font-weight: 600;}
.muscle-btn.active .muscle-count{background:var(--cor-primaria);color:#000;}

.ex-panel{background:var(--bg-principal);border-radius:0 0 8px 8px;margin:0 0 4px;border: 1px solid var(--borda);border-top: none;}
.ex-list{padding:6px 8px 10px;}
.ex-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s;gap:8px;}
.ex-item:hover{background:var(--bg-card);}
.ex-info{flex:1;}
.ex-name{font-size:13px;font-weight:500;color:var(--texto-claro);}
.ex-tags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.ex-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--bg-card);color:var(--texto-mutado);font-weight:500;border: 1px solid var(--borda);}

.ex-actions-cell {
  display: flex;
  align-items: center;
  gap: 4px;
}
.ex-add-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--cor-primaria);color:var(--cor-primaria);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;}
.ex-add-btn:hover{background:var(--cor-primaria);color:#000;}
.ex-del-btn {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--texto-mutado);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.ex-del-btn:hover {
  background: rgba(239, 68, 68, 0.1);
  border-color: rgba(239, 68, 68, 0.2);
  color: var(--cor-perigo);
}

/* FICHA */
.ficha-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;}
.ficha-title-block{flex:1;}
.ficha-label{font-size:11px;font-weight:600;color:var(--texto-mutado);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.ficha-name-input{background:var(--bg-card);border:1px solid var(--borda);border-radius:10px;padding:10px 14px;font-size:16px;font-weight:600;color:var(--texto-claro);font-family:inherit;width:100%;outline:none;transition:border .15s;}
.ficha-name-input:focus{border-color:var(--cor-primaria);}
.ficha-name-input::placeholder{color:var(--texto-mutado);}

.day-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.day-tab{padding:7px 14px;border-radius:8px;border:1px solid var(--borda);background:transparent;color:var(--texto-mutado);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.day-tab:hover{border-color:var(--cor-primaria);color:var(--texto-claro);}
.day-tab.active{background:var(--cor-primaria);border-color:var(--cor-primaria);color:#000;font-weight: 600;}

/* EMPTY STATE */
.ficha-empty{text-align:center;padding:48px 24px;color:var(--texto-mutado);}
.ficha-empty-icon{font-size:44px;margin-bottom:12px;}
.ficha-empty-text{font-size:14px;line-height:1.6;color:var(--texto-claro);}
.ficha-empty-hint{font-size:12px;color:var(--texto-mutado);margin-top:6px;}

/* EXERCISE CARDS */
.ficha-group{margin-bottom:20px;}
.ficha-group-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ficha-group-dot{width:8px;height:8px;border-radius:50%;}
.ficha-group-name{font-size:12px;font-weight:600;color:var(--texto-claro);text-transform:uppercase;letter-spacing:.07em;}
.ficha-ex-card{background:var(--bg-card);border:1px solid var(--borda);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:10px;}
.ficha-ex-name{font-size:13px;font-weight:500;color:var(--texto-claro);}
.ficha-ex-muscle{font-size:11px;color:var(--texto-mutado);margin-top:2px;}
.set-input-group{display:flex;flex-direction:column;align-items:center;gap:3px;}
.set-label{font-size:10px;color:var(--texto-mutado);font-weight:500;white-space:nowrap;}
.set-input{width:58px;background:var(--bg-principal);border:1px solid var(--borda);border-radius:6px;padding:5px 6px;font-size:12px;font-weight:600;color:var(--texto-claro);font-family:inherit;text-align:center;outline:none;transition:border .15s;}
.set-input:focus{border-color:var(--cor-primaria);}
.ficha-ex-remove{width:28px;height:28px;border-radius:6px;background:transparent;border:1px solid transparent;color:var(--texto-mutado);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ficha-ex-remove:hover{background:rgba(239, 68, 68, 0.1);border-color:rgba(239, 68, 68, 0.2);color:var(--cor-perigo);}

/* NOTES */
.section-label{font-size:11px;font-weight:600;color:var(--texto-mutado);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;margin-top:16px;}
.notes-area{background:var(--bg-card);border:1px solid var(--borda);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--texto-claro);font-family:inherit;width:100%;resize:vertical;min-height:80px;outline:none;transition:border .15s;}
.notes-area:focus{border-color:var(--cor-primaria);}
.notes-area::placeholder{color:var(--texto-mutado);}

/* SUMMARY */
.summary-bar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.summary-pill{background:var(--bg-card);border:1px solid var(--borda);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--texto-mutado);display:flex;align-items:center;gap:6px;}
.summary-pill strong{color:var(--cor-primaria);font-size:14px;}

/* BUTTONS / INPUT GENERIC */
input, select {
  background: var(--bg-input);
  border: 1px solid var(--borda);
  color: var(--texto-claro);
  border-radius: 6px;
  outline: none;
  font-family: inherit;
}
input:focus, select:focus { border-color: var(--cor-primaria); }

.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;border:none;}
.btn-primary{background:var(--cor-primaria);color:#000;}
.btn-primary:hover{background:var(--cor-primaria-hover);}
.btn-ghost{background:transparent;border:1px solid var(--borda);color:var(--texto-claro);}
.btn-ghost:hover{border-color:var(--cor-primaria);background:rgba(16, 185, 129, 0.05);}
.bottom-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg-card);border:1px solid var(--cor-primaria);color:var(--cor-primaria);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

/* MOBILE */
@media (max-width: 680px) {
  .container{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .sidebar{position:fixed;left:0;bottom:0;top:auto;width:100%;max-height:65vh;border-right:none;border-top:1px solid var(--borda);z-index:90;display:none;border-radius:16px 16px 0 0;}
  .sidebar.open{display:block;}
  .main{padding:16px;}
  .ficha-ex-card{grid-template-columns:1fr auto auto;grid-template-rows:auto auto;gap:8px;}
  .ficha-ex-card > div:first-child{grid-column:1/4;}
  .mobile-sidebar-btn{display:flex!important;}
  .header-actions .btn span{display:none;}
}
.mobile-sidebar-btn{display:none;position:fixed;bottom:24px;left:24px;z-index:80;width:52px;height:52px;border-radius:50%;background:var(--cor-primaria);border:none;color:#000;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,.3);align-items:center;justify-content:center;}

/* PRINT */
@media print {
  .sidebar,.header-actions,.mobile-sidebar-btn,.bottom-actions,.day-tabs,.ficha-ex-remove,.toast{display:none!important;}
  body{background:#fff;color:#111;}
  .header{background:#fff;border-bottom:2px solid #333;position:static;}
  .logo-text span{color:var(--cor-primaria);}
  .container{display:block;}
  .main{padding:12px 0;}
  .ficha-name-input{background:transparent;border:none;color:#111;font-size:22px;padding:0;}
  .ficha-group-name{color:#444;}
  .ficha-ex-card{background:#fff;border:1px solid #ddd;break-inside:avoid;}
  .ficha-ex-name{color:#111;}
  .ficha-ex-muscle{color:#666;}
  .set-label{color:#666;}
  .set-input{background:#f5f5f5;border:1px solid #ccc;color:#111;}
  .notes-area{background:#fff;border:1px solid #ccc;color:#111;}
  .section-label{color:#666;}
  .summary-pill{background:#f5f5f5;border:1px solid #ddd;}
  .summary-pill strong{color:#111;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">💪</div>
    <div class="logo-text">Ficha<span>Fit</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="printFicha()">🖨️ <span>Imprimir / PDF</span></button>
    <button class="btn btn-ghost" onclick="exportJSON()">📤 <span>Exportar</span></button>
    <button class="btn btn-primary" onclick="saveFicha()">💾 <span>Salvar</span></button>
  </div>
</div>

<div class="container">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header-actions">
      <div class="sidebar-title">Exercícios por grupo</div>
      <button class="btn-novo-ex" onclick="toggleFormExercicio()">＋ Novo Exercício</button>
    </div>

    <div class="form-novo-ex" id="formNovoEx" style="display: none;">
      <input type="text" id="novoExNome" placeholder="Nome do exercício..." autocomplete="off">
      <select id="novoExGrupo"></select>
      <button class="btn btn-primary" style="padding: 5px; font-size: 11px; width: 100%; justify-content: center;" onclick="salvarNovoExercicio()">Adicionar</button>
    </div>

    <div id="muscleGroups"></div>
  </div>

  <div class="main">
    <div class="ficha-header">
      <div class="ficha-title-block">
        <div class="ficha-label">Nome da ficha</div>
        <input class="ficha-name-input" id="fichaName" placeholder="Ex: Treino A – Peito e Tríceps" />
      </div>
    </div>

    <div class="summary-bar" id="summaryBar"></div>
    <div class="day-tabs" id="dayTabs"></div>
    <div id="fichaContent"></div>

    <div class="section-label">Observações do dia</div>
    <textarea class="notes-area" id="notesArea" placeholder="Anotações sobre cargas, progressão, como se sentiu..."></textarea>

    <div class="bottom-actions">
      <button class="btn btn-ghost" onclick="clearDay()">🗑️ Limpar dia</button>
      <button class="btn btn-ghost" onclick="importJSON()">📥 Importar ficha</button>
    </div>
  </div>
</div>

<button class="mobile-sidebar-btn" id="mobileSidebarBtn" onclick="toggleMobileSidebar()" title="Adicionar exercício">＋</button>
<div class="toast" id="toast"></div>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)"/>

<script>
const MUSCLE_COLORS = {
  'Peito':'#38bdf8','Costas':'#4ade80','Ombro':'#fb923c',
  'Bíceps':'#f472b6','Tríceps':'#c084fc','Perna':'#facc15',
  'Glúteo':'#f87171','Panturrilha':'#22d3ee','Abdômen':'#fbbf24','Cardio':'#818cf8'
};

// Banco de dados inicial padrão
const EXERCICIOS_PADRAO = {
  'Peito':[
    {name:'Supino com halteres',tags:['compound','push']},
    {name:'Crucifixo no banco',tags:['isolação','chest']},
    {name:'Supino inclinado c/ halteres',tags:['compound','upper']},
    {name:'Crucifixo inclinado',tags:['isolação','upper']},
    {name:'Flexão de braço',tags:['bodyweight','push']},
    {name:'Pull over com halter',tags:['compound','stretch']},
    {name:'Supino declinado c/ halteres',tags:['compound','lower']},
  ],
  'Costas':[
    {name:'Remada unilateral no banco',tags:['compound','pull']},
    {name:'Remada curvada c/ halteres',tags:['compound','pull']},
    {name:'Remada alta com halteres',tags:['compound','upper']},
    {name:'Bom dia com halteres',tags:['posterior','hinge']},
    {name:'Pull over deitado',tags:['compound','stretch']},
    {name:'Remada sentado c/ halteres',tags:['compound','mid']},
  ],
  'Ombro':[
    {name:'Desenvolvimento c/ halteres',tags:['compound','press']},
    {name:'Elevação lateral',tags:['isolação','lateral']},
    {name:'Elevação frontal',tags:['isolação','anterior']},
    {name:'Desenvolvimento Arnold',tags:['compound','full']},
    {name:'Pássaro (crucifixo invertido)',tags:['isolação','posterior']},
    {name:'Encolhimento de ombros',tags:['trapézio','shrug']},
    {name:'Elevação lateral inclinado',tags:['isolação','lateral']},
  ],
  'Bíceps':[
    {name:'Rosca direta com halteres',tags:['isolação','curl']},
    {name:'Rosca martelo',tags:['isolação','neutral']},
    {name:'Rosca concentrada',tags:['isolação','peak']},
    {name:'Rosca inclinada',tags:['isolação','stretch']},
    {name:'Rosca alternada',tags:['isolação','unilateral']},
    {name:'Rosca 21',tags:['isolação','intenso']},
  ],
  'Tríceps':[
    {name:'Tríceps testa com halter',tags:['isolação','skull']},
    {name:'Extensão acima da cabeça',tags:['isolação','overhead']},
    {name:'Extensão unilateral',tags:['isolação','unilateral']},
    {name:'Kickback',tags:['isolação','extension']},
    {name:'Mergulho no banco',tags:['bodyweight','dip']},
    {name:'Tríceps francês',tags:['isolação','long head']},
  ],
  'Perna':[
    {name:'Agachamento goblet c/ halter',tags:['compound','squat']},
    {name:'Agachamento sumô c/ halter',tags:['compound','inner']},
    {name:'Avanço com halteres',tags:['compound','lunge']},
    {name:'Passada lateral',tags:['compound','lateral']},
    {name:'Stiff com halteres',tags:['posterior','hinge']},
    {name:'Stiff unilateral',tags:['posterior','unilateral']},
    {name:'Agachamento búlgaro',tags:['compound','unilateral']},
    {name:'Agachamento sumo profundo',tags:['compound','deep']},
  ],
  'Glúteo':[
    {name:'Elevação pélvica c/ halter',tags:['isolação','hip thrust']},
    {name:'Elevação pélvica unilateral',tags:['isolação','unilateral']},
    {name:'Abdução em pé c/ halter',tags:['isolação','abduction']},
    {name:'Coice com halter',tags:['isolação','kickback']},
    {name:'Agachamento sumo lateral',tags:['compound','wide']},
  ],
  'Panturrilha':[
    {name:'Panturrilha em pé c/ halter',tags:['isolação','calf']},
    {name:'Panturrilha unilateral',tags:['isolação','unilateral']},
    {name:'Panturrilha sentado',tags:['soleus','seated']},
    {name:'Panturrilha no degrau',tags:['isolação','range']},
  ],
  'Abdômen':[
    {name:'Prancha',tags:['core','isometric']},
    {name:'Abdominal crunch c/ halter',tags:['isolação','crunch']},
    {name:'Russian twist c/ halter',tags:['oblíquos','rotation']},
    {name:'Elevação de pernas',tags:['lower','raise']},
    {name:'Dead bug',tags:['core','stability']},
    {name:'Abdominal bicicleta',tags:['oblíquos','dynamic']},
  ],
  'Cardio':[
    {name:'Caminhada',tags:['low','steady']},
    {name:'Corrida',tags:['moderate','cardio']},
    {name:'HIIT',tags:['high','interval']},
    {name:'Corda de pular',tags:['jump','rope']},
    {name:'Swing c/ halter',tags:['full body','power']},
    {name:'Burpee',tags:['full body','intense']},
  ],
};

const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];

let state = {
  fichaName:'',
  activeDay:0,
  openGroup:null,
  days:DAYS.map(d=>({name:d,exercises:[],notes:''})),
  customExercises: JSON.parse(JSON.stringify(EXERCICIOS_PADRAO)) // Cópia mutável para o usuário alterar
};

// Recupera dados salvos
try {
  const s = localStorage.getItem('fichafit_v3');
  if(s) {
    const parsed = JSON.parse(s);
    // Garante compatibilidade caso o usuário não tivesse a lista customizada salva ainda
    if(!parsed.customExercises) parsed.customExercises = JSON.parse(JSON.stringify(EXERCICIOS_PADRAO));
    state = parsed;
  }
} catch(e){}

function persist(){try{localStorage.setItem('fichafit_v3',JSON.stringify(state));}catch(e){}}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function flushNotes(){
  const n=document.getElementById('notesArea');
  if(n)state.days[state.activeDay].notes=n.value;
}

// ---- POPULAR SELECT DE GRUPOS ----
function popularSelectGrupos() {
  const select = document.getElementById('novoExGrupo');
  select.innerHTML = Object.keys(state.customExercises).map(g => `<option value="${g}">${g}</option>`).join('');
}

// ---- INTERFACE DO FORMULÁRIO DE EXERCÍCIOS ----
function toggleFormExercicio() {
  const form = document.getElementById('formNovoEx');
  form.style.display = form.style.display === 'none' ? 'flex' : 'none';
}

function salvarNovoExercicio() {
  const nomeInput = document.getElementById('novoExNome');
  const grupoSelect = document.getElementById('novoExGrupo');
  
  const nome = nomeInput.value.trim();
  const grupo = grupoSelect.value;

  if(!nome) {
    alert('Por favor, digite o nome do exercício.');
    return;
  }

  // Verifica duplicatas no grupo
  const existe = state.customExercises[grupo].some(e => e.name.toLowerCase() === nome.toLowerCase());
  if(existe) {
    alert('Esse exercício já existe neste grupo muscular!');
    return;
  }

  // Adiciona ao banco customizado
  state.customExercises[grupo].push({
    name: nome,
    tags: ['customizado']
  });

  nomeInput.value = '';
  toggleFormExercicio();
  persist();
  renderSidebar();
  showToast(`💪 ${nome} criado em ${grupo}!`);
}

function excluirExercicioDoGrupo(grupo, idx, event) {
  event.stopPropagation(); // Evita adicionar o exercício ao clicar no botão de apagar
  
  const exNome = state.customExercises[grupo][idx].name;
  if(!confirm(`Deseja mesmo remover permanentemente o exercício "${exNome}" do grupo ${grupo}?`)) return;

  state.customExercises[grupo].splice(idx, 1);
  persist();
  renderSidebar();
  showToast(`🗑️ Exercício removido do grupo.`);
}

// ---- RENDER SIDEBAR ----
function renderSidebar(){
  const el=document.getElementById('muscleGroups');
  el.innerHTML=Object.entries(state.customExercises).map(([group,exs])=>{
    const color=MUSCLE_COLORS[group]||'#9B92BC';
    const isOpen=state.openGroup===group;
    const count=state.days[state.activeDay].exercises.filter(e=>e.group===group).length;
    return `<div class="muscle-group">
      <button class="muscle-btn ${isOpen?'active':''}" onclick="toggleGroup('${group}')">
        <span class="muscle-dot" style="background:${color}"></span>
        <span class="muscle-name">${group}</span>
        ${count>0?`<span class="muscle-count">${count}</span>`:''}
      </button>
      ${isOpen?`<div class="ex-panel"><div class="ex-list">
        ${exs.length === 0 ? '<div style="font-size:11px; color:var(--texto-mutado); padding:8px 10px;">Nenhum exercício neste grupo.</div>' : ''}
        ${exs.map((ex,i)=>`<div class="ex-item" onclick="addExercise('${group}',${i})">
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-tags">${ex.tags.map(t=>`<span class="ex-tag">${t}</span>`).join('')}</div>
          </div>
          <div class="ex-actions-cell">
            <button class="ex-del-btn" onclick="excluirExercicioDoGrupo('${group}',${i}, event)" title="Excluir do grupo">🗑️</button>
            <button class="ex-add-btn" onclick="event.stopPropagation();addExercise('${group}',${i})">+</button>
          </div>
        </div>`).join('')}
      </div></div>`:''}
    </div>`;
  }).join('');
}

// ---- RENDER DAY TABS ----
function renderDayTabs(){
  const el=document.getElementById('dayTabs');
  el.innerHTML=state.days.map((d,i)=>{
    const has=d.exercises.length>0;
    return `<button class="day-tab ${i===state.activeDay?'active':''}" onclick="switchDay(${i})">
      ${d.name}${has?` <span style="color:${i===state.activeDay?'#000':'var(--cor-primaria)'};font-size:9px;">●</span>`:''}
    </button>`;
  }).join('');
}

// ---- RENDER SUMMARY ----
function renderSummary(){
  const day=state.days[state.activeDay];
  const total=day.exercises.length;
  const totalSeries=day.exercises.reduce((a,e)=>a+(parseInt(e.series)||0),0);
  const groups=[...new Set(day.exercises.map(e=>e.group))].length;
  const el=document.getElementById('summaryBar');
  if(total===0){el.innerHTML='';return;}
  el.innerHTML=`
    <div class="summary-pill">🏋️ <strong>${total}</strong> exercícios</div>
    <div class="summary-pill">🔁 <strong>${totalSeries}</strong> séries totais</div>
    <div class="summary-pill">💪 <strong>${groups}</strong> grupo${groups>1?'s':''} muscular${groups>1?'es':''}</div>
  `;
}

// ---- RENDER FICHA ----
function renderFicha(){
  const el=document.getElementById('fichaContent');
  const day=state.days[state.activeDay];

  if(day.exercises.length===0){
    el.innerHTML=`<div class="ficha-empty">
      <div class="ficha-empty-icon">📋</div>
      <div class="ficha-empty-text">Nenhum exercício adicionado.<br>Selecione um grupo muscular e clique em <strong>+</strong>.</div>
    </div>`;
    return;
  }

  const grouped={};
  day.exercises.forEach(ex=>{
    if(!grouped[ex.group])grouped[ex.group]=[];
    grouped[ex.group].push(ex);
  });

  el.innerHTML=Object.entries(grouped).map(([group,exs])=>{
    const color=MUSCLE_COLORS[group]||'#9B92BC';
    return `<div class="ficha-group">
      <div class="ficha-group-header">
        <span class="ficha-group-dot" style="background:${color}"></span>
        <span class="ficha-group-name" style="color:${color}">${group}</span>
      </div>
      ${exs.map((ex,i)=>`
        <div class="ficha-ex-card">
          <div>
            <div class="ficha-ex-name">${ex.name}</div>
            <div class="ficha-ex-muscle">${ex.group}</div>
          </div>
          <div class="set-input-group">
            <span class="set-label">Séries</span>
            <input class="set-input" type="number" min="1" max="20" value="${ex.series||4}"
              onchange="updateEx('${group}',${i},'series',this.value)"/>
          </div>
          <div class="set-input-group">
            <span class="set-label">Reps</span>
            <input class="set-input" type="number" min="1" max="100" value="${ex.reps||12}"
              onchange="updateEx('${group}',${i},'reps',this.value)"/>
          </div>
          <div class="set-input-group">
            <span class="set-label">Carga kg</span>
            <input class="set-input" type="number" min="0" step="0.5" value="${ex.weight||''}" placeholder="—"
              onchange="updateEx('${group}',${i},'weight',this.value)"/>
          </div>
          <button class="ficha-ex-remove" onclick="removeExercise('${group}',${i})" title="Remover">✕</button>
        </div>
      `).join('')}
    </div>`;
  }).join('');

  document.getElementById('notesArea').value=day.notes||'';
}

function render(){
  renderSidebar();
  renderDayTabs();
  renderSummary();
  renderFicha();
  document.getElementById('fichaName').value=state.fichaName||'';
}

// ---- ACTIONS ----
function toggleGroup(group){
  state.openGroup=state.openGroup===group?null:group;
  renderSidebar();
}

function switchDay(i){
  flushNotes();
  state.activeDay=i;
  state.openGroup=null;
  closeMobileSidebar();
  render();
}

function addExercise(group,idx){
  const ex=state.customExercises[group][idx];
  const day=state.days[state.activeDay];
  if(day.exercises.find(e=>e.name===ex.name&&e.group===group)){
    showToast('Exercício já adicionado!');return;
  }
  day.exercises.push({name:ex.name,group,series:4,reps:12,weight:''});
  persist();render();
  showToast(`✓ ${ex.name} adicionado`);
}

function removeExercise(group,idx){
  const day=state.days[state.activeDay];
  const groupExs=day.exercises.filter(e=>e.group===group);
  const toRemove=groupExs[idx];
  day.exercises=day.exercises.filter(e=>!(e.name===toRemove.name&&e.group===toRemove.group));
  persist();render();
}

function updateEx(group,idx,field,value){
  const day=state.days[state.activeDay];
  const groupExs=day.exercises.filter(e=>e.group===group);
  const ex=groupExs[idx];
  if(ex)ex[field]=field==='weight'?value:(parseInt(value)||0);
  persist();renderSummary();
}

function clearDay(){
  if(!confirm('Limpar todos os exercícios deste dia?'))return;
  state.days[state.activeDay].exercises=[];
  state.days[state.activeDay].notes='';
  persist();render();
}

function saveFicha(){
  flushNotes();
  state.fichaName=document.getElementById('fichaName').value;
  persist();
  showToast('✅ Ficha salva!');
}

function printFicha(){
  flushNotes();
  state.fichaName=document.getElementById('fichaName').value;
  persist();window.print();
}

function exportJSON(){
  flushNotes();
  state.fichaName=document.getElementById('fichaName').value;
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`fichafit_${(state.fichaName||'treino').replace(/\s+/g,'_')}.json`;
  a.click();
  showToast('📤 Ficha exportada!');
}

function importJSON(){document.getElementById('importInput').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const imported=JSON.parse(ev.target.result);
      if(imported.days&&Array.isArray(imported.days)){
        Object.assign(state,imported);
        persist();render();
        showToast('📥 Ficha importada!');
      }else{showToast('❌ Arquivo inválido');}
    }catch{showToast('❌ Erro ao importar');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ---- MOBILE SIDEBAR ----
function toggleMobileSidebar(){
  const s=document.getElementById('sidebar');
  s.classList.toggle('open');
}
function closeMobileSidebar(){
  document.getElementById('sidebar').classList.remove('open');
}

// ---- EVENTS ----
document.getElementById('fichaName').addEventListener('input',e=>{state.fichaName=e.target.value;});
document.getElementById('notesArea').addEventListener('input',e=>{state.days[state.activeDay].notes=e.target.value;});

document.addEventListener('click',e=>{
  const s=document.getElementById('sidebar');
  const btn=document.getElementById('mobileSidebarBtn');
  if(s.classList.contains('open')&&!s.contains(e.target)&&e.target!==btn){
    closeMobileSidebar();
  }
});

// Inicialização
popularSelectGrupos();
render();
</script>
</body>
</html>
