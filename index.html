<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha de Treino App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Ajustes finos de estilo baseados no seu default_shadcn_theme.css */
        body {
            background-color: #f3f3f5;
            color: #030213;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .print-card { border: 1px solid #000; box-shadow: none !important; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="root" class="flex-1 flex flex-col"></div>

    <script type="text/babel">
        // Atalhos para as funções do React
        const { useState, useEffect } = React;

        // Componente de Ícone Genérico usando Lucide
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const [iconHtml, setIconHtml] = useState('');

            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const svg = window.lucide.createSvg(window.lucide.icons[name], {
                        class: className,
                        ...props
                    });
                    // O lucide.createSvg retorna um elemento DOMElement, pegamos o outerHTML
                    const div = document.createElement('div');
                    div.appendChild(svg);
                    setIconHtml(div.innerHTML);
                }
            }, [name, className]);

            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} class="inline-block align-middle" />;
        };

        // Dados Iniciais de Exemplo
        const initialWorkouts = [
            {
                id: '1',
                name: 'Treino A - Peito e Tríceps',
                description: 'Foco em hipertrofia e progressão de carga',
                exercises: [
                    { id: 'e1', name: 'Supino Reto com Barra', sets: 4, reps: '10', weight: '30kg cada lado' },
                    { id: 'e2', name: 'Crucifixo Inclinado com Halteres', sets: 3, reps: '12', weight: '18kg' },
                    { id: 'e3', name: 'Tríceps Corda na Polia', sets: 4, reps: '12-15', weight: '25kg' }
                ]
            },
            {
                id: '2',
                name: 'Treino B - Costas e Bíceps',
                description: 'Foco em amplitude de movimento',
                exercises: [
                    { id: 'e4', name: 'Puxada Alta Pronada', sets: 4, reps: '10', weight: '50kg' },
                    { id: 'e5', name: 'Remada Curvada com Barra', sets: 3, reps: '12', weight: '20kg cada lado' },
                    { id: 'e6', name: 'Rosca Direta com Barra W', sets: 4, reps: '10', weight: '12kg cada lado' }
                ]
            }
        ];

        // Componente Principal da Aplicação
        function App() {
            const [workouts, setWorkouts] = useState(initialWorkouts);
            const [activeWorkoutId, setActiveWorkoutId] = useState('1');
            const [isDarkMode, setIsDarkMode] = useState(false);

            // Estados para novos treinos/exercícios
            const [newWorkoutName, setNewWorkoutName] = useState('');
            const [newWorkoutDesc, setNewWorkoutDesc] = useState('');
            
            const [newExName, setNewExName] = useState('');
            const [newExSets, setNewExSets] = useState(3);
            const [newExReps, setNewExReps] = useState('10');
            const [newExWeight, setNewExWeight] = useState('');

            const activeWorkout = workouts.find(w => w.id === activeWorkoutId) || workouts[0];

            // Alternar tema Dark Mode (Shadcn style)
            const toggleDarkMode = () => {
                setIsDarkMode(!isDarkMode);
                document.documentElement.classList.toggle('dark');
            };

            // Criar Novo Treino (Ficha)
            const handleCreateWorkout = (e) => {
                e.preventDefault();
                if (!newWorkoutName.trim()) return;

                const newWorkout = {
                    id: Date.now().toString(),
                    name: newWorkoutName,
                    description: newWorkoutDesc,
                    exercises: []
                };

                setWorkouts([...workouts, newWorkout]);
                setActiveWorkoutId(newWorkout.id);
                setNewWorkoutName('');
                setNewWorkoutDesc('');
            };

            // Adicionar Exercício ao Treino Ativo
            const handleAddExercise = (e) => {
                e.preventDefault();
                if (!newExName.trim() || !activeWorkout) return;

                const newExercise = {
                    id: Date.now().toString(),
                    name: newExName,
                    sets: parseInt(newExSets) || 3,
                    reps: newExReps,
                    weight: newExWeight || 'Sem carga'
                };

                const updatedWorkouts = workouts.map(w => {
                    if (w.id === activeWorkout.id) {
                        return { ...w, exercises: [...w.exercises, newExercise] };
                    }
                    return w;
                });

                setWorkouts(updatedWorkouts);
                setNewExName('');
                setNewExWeight('');
            };

            // Deletar Exercício
            const handleDeleteExercise = (exId) => {
                const updatedWorkouts = workouts.map(w => {
                    if (w.id === activeWorkout.id) {
                        return { ...w, exercises: w.exercises.filter(ex => ex.id !== exId) };
                    }
                    return w;
                });
                setWorkouts(updatedWorkouts);
            };

            // Deletar Ficha de Treino Inteira
            const handleDeleteWorkout = (wId) => {
                if (workouts.length <= 1) {
                    alert("Você precisa manter pelo menos uma ficha de treino ativa!");
                    return;
                }
                const filtered = workouts.filter(w => w.id !== wId);
                setWorkouts(filtered);
                setActiveWorkoutId(filtered[0].id);
            };

            return (
                <div class={`min-h-screen flex flex-col ${isDarkMode ? 'bg-[#141414] text-white' : 'bg-[#f3f3f5] text-[#030213]'}`}>
                    
                    {/* BARRA DE NAVEGAÇÃO SUPERIOR */}
                    <header class="no-print border-b border-gray-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="bg-[#030213] text-white dark:bg-white dark:text-[#030213] p-2 rounded-xl">
                                <Icon name="Dumbbell" className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 class="text-xl font-bold tracking-tight">Ficha de Treino</h1>
                                <p class="text-xs text-gray-500 dark:text-gray-400">Monte e organize sua rotina fitness</p>
                            </div>
                        </div>

                        <div class="flex items-center gap-3">
                            <button 
                                onClick={toggleDarkMode}
                                class="p-2 rounded-lg border border-gray-200 dark:border-zinc-700 hover:bg-gray-100 dark:hover:bg-zinc-800 transition"
                            >
                                <Icon name={isDarkMode ? "Sun" : "Moon"} className="w-5 h-5" />
                            </button>
                            <button 
                                onClick={() => window.print()}
                                class="bg-[#030213] text-white dark:bg-white dark:text-[#030213] px-4 py-2 rounded-lg font-medium text-sm flex items-center gap-2 hover:opacity-90 transition shadow-sm"
                            >
                                <Icon name="Printer" className="w-4 h-4" /> Exportar / PDF
                            </button>
                        </div>
                    </header>

                    {/* CONTEÚDO PRINCIPAL */}
                    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
                        
                        {/* COLUNA ESQUERDA: LISTA DE TREINOS E CADASTROS */}
                        <section class="no-print md:col-span-4 space-y-6">
                            
                            {/* Card: Seletor de Fichas */}
                            <div class="bg-white dark:bg-zinc-900 rounded-xl p-5 border border-gray-100 dark:border-zinc-800 shadow-sm space-y-4">
                                <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                                    <Icon name="List" className="w-4 h-4" /> Suas Fichas
                                </h2>
                                <div class="space-y-2">
                                    {workouts.map(w => (
                                        <div 
                                            key={w.id}
                                            onClick={() => setActiveWorkoutId(w.id)}
                                            class={`w-full p-3.5 rounded-lg flex justify-between items-center cursor-pointer transition border ${
                                                activeWorkoutId === w.id 
                                                    ? 'bg-zinc-100 dark:bg-zinc-800 border-zinc-300 dark:border-zinc-600 font-medium' 
                                                    : 'border-transparent hover:bg-gray-50 dark:hover:bg-zinc-800/50'
                                            }`}
                                        >
                                            <div class="flex flex-col items-start truncate mr-2">
                                                <span class="truncate">{w.name}</span>
                                                {w.description && <span class="text-xs text-gray-400 truncate">{w.description}</span>}
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); handleDeleteWorkout(w.id); }}
                                                class="text-gray-400 hover:text-red-500 p-1 rounded transition"
                                                title="Excluir treino"
                                            >
                                                <Icon name="Trash2" className="w-4 h-4" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Card: Criar Nova Ficha */}
                            <div class="bg-white dark:bg-zinc-900 rounded-xl p-5 border border-gray-100 dark:border-zinc-800 shadow-sm">
                                <h3 class="font-semibold mb-3 flex items-center gap-2 text-sm">
                                    <Icon name="FolderPlus" className="w-4 h-4" /> Nova Ficha de Treino
                                </h3>
                                <form onSubmit={handleCreateWorkout} class="space-y-3">
                                    <input 
                                        type="text" 
                                        placeholder="Ex: Treino C - Pernas" 
                                        value={newWorkoutName}
                                        onChange={(e) => setNewWorkoutName(e.target.value)}
                                        class="w-full px-3 py-2 rounded-lg bg-gray-50 dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-400"
                                        required
                                    />
                                    <input 
                                        type="text" 
                                        placeholder="Foco em quadríceps (Opcional)" 
                                        value={newWorkoutDesc}
                                        onChange={(e) => setNewWorkoutDesc(e.target.value)}
                                        class="w-full px-3 py-2 rounded-lg bg-gray-50 dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-sm focus:outline-none focus:ring-2 focus:ring-zinc-400"
                                    />
                                    <button type="submit" class="w-full bg-[#030213] dark:bg-white dark:text-[#030213] text-white py-2 rounded-lg font-medium text-xs hover:opacity-90 transition">
                                        Criar Ficha
                                    </button>
                                </form>
                            </div>
                        </section>

                        {/* COLUNA DIREITA: VISUALIZAÇÃO DOS EXERCÍCIOS DA FICHA ATIVA */}
                        <section class="col-span-1 md:col-span-8 space-y-6">
                            
                            {activeWorkout ? (
                                <div class="bg-white dark:bg-zinc-900 rounded-xl border border-gray-200 dark:border-zinc-800 p-6 shadow-sm print-card">
                                    {/* Cabeçalho do Treino Selecionado */}
                                    <div class="border-b border-gray-100 dark:border-zinc-800 pb-4 mb-6 flex justify-between items-start">
                                        <div>
                                            <h2 class="text-2xl font-bold tracking-tight">{activeWorkout.name}</h2>
                                            <p class="text-gray-500 dark:text-gray-400 text-sm">{activeWorkout.description || 'Sem descrição cadastrada'}</p>
                                        </div>
                                        <span class="text-xs bg-zinc-100 dark:bg-zinc-800 px-2.5 py-1 rounded-full font-medium text-gray-600 dark:text-gray-300 print-card">
                                            {activeWorkout.exercises.length} Exercício(s)
                                        </span>
                                    </div>

                                    {/* Formulário no-print interno para adicionar exercícios */}
                                    <div class="no-print bg-gray-50 dark:bg-zinc-800/40 border border-gray-100 dark:border-zinc-800/80 rounded-xl p-4 mb-6">
                                        <h3 class="font-medium text-sm mb-3 flex items-center gap-2">
                                            <Icon name="PlusCircle" className="w-4 h-4" /> Adicionar Exercício à Ficha
                                        </h3>
                                        <form onSubmit={handleAddExercise} class="grid grid-cols-1 sm:grid-cols-12 gap-3">
                                            <div class="sm:col-span-5">
                                                <input 
                                                    type="text" 
                                                    placeholder="Nome do Exercício (Ex: Leg Press)" 
                                                    value={newExName}
                                                    onChange={(e) => setNewExName(e.target.value)}
                                                    class="w-full px-3 py-2 rounded-lg bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-sm focus:outline-none"
                                                    required
                                                />
                                            </div>
                                            <div class="sm:col-span-2">
                                                <input 
                                                    type="number" 
                                                    placeholder="Séries" 
                                                    value={newExSets}
                                                    onChange={(e) => setNewExSets(e.target.value)}
                                                    class="w-full px-3 py-2 rounded-lg bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-sm focus:outline-none"
                                                    min="1"
                                                />
                                            </div>
                                            <div class="sm:col-span-2">
                                                <input 
                                                    type="text" 
                                                    placeholder="Reps (Ex: 12)" 
                                                    value={newExReps}
                                                    onChange={(e) => setNewExReps(e.target.value)}
                                                    class="w-full px-3 py-2 rounded-lg bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-sm focus:outline-none"
                                                />
                                            </div>
                                            <div class="sm:col-span-3">
                                                <input 
                                                    type="text" 
                                                    placeholder="Carga (Ex: 100kg)" 
                                                    value={newExWeight}
                                                    onChange={(e) => setNewExWeight(e.target.value)}
                                                    class="w-full px-3 py-2 rounded-lg bg-white dark:bg-zinc-800 border border-gray-200 dark:border-zinc-700 text-sm focus:outline-none"
                                                />
                                            </div>
                                            <div class="col-span-1 sm:col-span-12 flex justify-end">
                                                <button type="submit" class="bg-[#030213] dark:bg-white dark:text-[#030213] text-white px-4 py-2 rounded-lg font-medium text-xs hover:opacity-90 transition flex items-center gap-1.5">
                                                    <Icon name="Plus" className="w-3.5 h-3.5" /> Adicionar
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    {/* TABELA DE EXERCÍCIOS */}
                                    {activeWorkout.exercises.length === 0 ? (
                                        <div class="text-center py-12 border-2 border-dashed border-gray-200 dark:border-zinc-800 rounded-xl">
                                            <Icon name="Dumbbell" className="w-10 h-10 text-gray-300 mx-auto mb-3" />
                                            <p class="text-sm text-gray-500 dark:text-gray-400">Nenhum exercício adicionado a esta ficha ainda.</p>
                                        </div>
                                    ) : (
                                        <div class="overflow-x-auto">
                                            <table class="w-full text-left border-collapse">
                                                <thead>
                                                    <tr class="border-b border-gray-200 dark:border-zinc-800 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                                                        <th class="py-3 px-2">Exercício</th>
                                                        <th class="py-3 px-2 text-center">Séries</th>
                                                        <th class="py-3 px-2 text-center">Repetições</th>
                                                        <th class="py-3 px-2">Carga</th>
                                                        <th class="py-3 px-2 text-right no-print"></th>
                                                    </tr>
                                                </thead>
                                                <tbody class="divide-y divide-gray-100 dark:divide-zinc-800/60 text-sm">
                                                    {activeWorkout.exercises.map(ex => (
                                                        <tr key={ex.id} class="hover:bg-gray-50/50 dark:hover:bg-zinc-800/30 transition">
                                                            <td class="py-3.5 px-2 font-medium">{ex.name}</td>
                                                            <td class="py-3.5 px-2 text-center font-mono">{ex.sets}</td>
                                                            <td class="py-3.5 px-2 text-center font-mono">{ex.reps}</td>
                                                            <td class="py-3.5 px-2 text-gray-600 dark:text-gray-300 font-medium">{ex.weight}</td>
                                                            <td class="py-3.5 px-2 text-right no-print">
                                                                <button 
                                                                    onClick={() => handleDeleteExercise(ex.id)}
                                                                    class="text-gray-400 hover:text-red-500 p-1 rounded transition"
                                                                >
                                                                    <Icon name="X" className="w-4 h-4" />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}

                                </div>
                            ) : (
                                <div class="text-center py-12 bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-xl">
                                    <p class="text-sm text-gray-500">Selecione ou crie um treino na barra lateral.</p>
                                </div>
                            )}

                        </section>
                    </main>

                    {/* RODAPÉ */}
                    <footer class="no-print mt-auto border-t border-gray-200 dark:border-zinc-800 py-4 text-center text-xs text-gray-400 bg-white dark:bg-zinc-900">
                        Ficha de Treino App — Baseado em componentes shadcn/ui e design Figma Make.
                    </footer>
                </div>
            );
        }

        // Renderização no elemento #root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
